resources:
  jobs:
    sample_pyspark_job:
      name: sample-pyspark-job-${bundle.target}
      tasks:
        - task_key: run_sample_pipeline
          spark_python_task:
            python_file: ../jobs/main.py
            source: WORKSPACE
            parameters:
              - --output-path
              - ${var.output_path}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
