# Sample job configuration for Databricks using serverless compute.

# Define the Job configuration
job:
  name: Sample Job
  compute_key: serverless_policy_key  # This points to the serverless compute policy
  spark_python_task:
    python_file: dbfs:/FileStore/jobs/your-script.py
  # Other configurations can remain as needed
  # e.g. library, spark_conf, etc.
